<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST Tester Extendido.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f2efe9;
            --ink: #1a1a19;
            --stone: #78756c;
            --accent: #d23a27;
            --code-bg: #e6e3da;
            --border-light: #d1cdc1;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Manrope', system-ui, sans-serif;
            font-size: 1.125rem;
            line-height: 1.6;
            padding: 3rem clamp(1.5rem, 6vw, 8rem);
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 400;
            line-height: 0.9;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        h2 {
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--stone);
            font-weight: normal;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .section {
            padding: 1.5rem;
            border: 1px solid var(--border-light);
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.3);
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            background: transparent;
            border: 1px solid var(--ink);
            color: var(--ink);
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .result-box {
            background: var(--code-bg);
            padding: 2rem;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            overflow-x: auto;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            border-left: 4px solid var(--accent);
            margin-top: 2rem;
        }
        
        .header-link {
            display: inline-block;
            margin-bottom: 2rem;
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--stone);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .header-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="header-link">⮜ Volver al Chat</a>
        <h1>REST Tester Extendido.</h1>
        <p style="margin-bottom: 3rem;">Explora las relaciones completas de la Base de Datos.</p>
        
        <div class="section">
            <h2>👤 Users</h2>
            <div class="controls">
                <button onclick="testAPI('GET', '/api/users', 'user')">GET All</button>
                <button onclick="testAPI('POST', '/api/users', 'user')">POST (Crear Dummy)</button>
                <button onclick="deleteLast('user', '/api/users/')">DELETE (Último Creado)</button>
            </div>
        </div>

        <div class="section">
            <h2>💬 Conversations</h2>
            <div class="controls">
                <button onclick="testAPI('GET', '/api/conversations', 'convo')">GET All</button>
                <button onclick="testAPI('POST', '/api/conversations', 'convo')">POST (Crear Dummy)</button>
                <button onclick="deleteLast('convo', '/api/conversations/')">DELETE (Última Creada)</button>
            </div>
        </div>

        <div class="section">
            <h2>✉️ Messages</h2>
            <div class="controls">
                <button onclick="testAPI('GET', '/api/messages', 'msg')">GET All</button>
                <button onclick="testPOSTMessage()">POST (Mensaje Aleatorio)</button>
                <button onclick="testGETMessageById()">GET (Por ID Último)</button>
                <button onclick="deleteLast('msg', '/api/messages/')">DELETE (Último)</button>
            </div>
        </div>

        <button onclick="clearResponse()" style="border-color: var(--accent); color: var(--accent); margin-bottom: 2rem;">Limpiar Terminal</button>

        <div class="result-box" id="result">Awaiting Execution...</div>
    </div>

    <script>
        const resultBox = document.getElementById('result');
        
        // Memoria local de IDs creados por categoria para facilitar la prueba
        const state = {
            user: null,
            convo: null,
            msg: null
        };

        function logResult(method, url, status, data, type = null) {
            const time = new Date().toLocaleTimeString();
            const text = `[${time}] ${method} ${url} -> Status: ${status}\n\n${JSON.stringify(data, null, 2)}\n\n`;
            
            if (resultBox.textContent.trim() === "Awaiting Execution...") resultBox.textContent = "";
            resultBox.textContent = text + resultBox.textContent;
            
            // Actualizar IDs para facilitar el borrado o busquedas precisas
            if (type !== null) {
                if (data && data.id) state[type] = data.id;
                else if (Array.isArray(data) && data.length > 0) state[type] = data[0].id; // Asumimos que el backend devuelve ORDER BY id DESC
            }
        }

        // Peticion generica GET/POST sin cuerpo (porque en los controllers ya se auto-asigna valores aleatorios para testear)
        async function testAPI(method, url, stateType) {
            try {
                const options = { method };
                const res = await fetch(url, options);
                
                // Content puede estar vacio (como DELETE)
                let data = {};
                if (res.status !== 204) data = await res.json();
                
                logResult(method, url, res.status, data, stateType);
            } catch (err) {
                logResult(method, url, 'ERROR', err.message);
            }
        }

        // POST Especializado para mensajes porque require un body 'role' y 'content'
        async function testPOSTMessage() {
            try {
                const randomStr = Math.random().toString(36).substring(7);
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        role: 'sys_tester', 
                        content: `Mensaje de test con FKs y nueva DB [${randomStr}]` 
                    })
                });
                const data = await res.json();
                logResult('POST', '/api/messages', res.status, data, 'msg');
            } catch (err) {
                logResult('POST', '/api/messages', 'ERROR', err.message);
            }
        }

        // GET Single message by ID
        async function testGETMessageById() {
            if (!state.msg) {
                resultBox.textContent = `[!] Necesitas primero un GET All o POST Messages para registrar qué ID buscar.\n\n` + resultBox.textContent;
                return;
            }
            try {
                const res = await fetch(`/api/messages/${state.msg}`);
                const data = await res.json();
                logResult('GET', `/api/messages/${state.msg}`, res.status, data);
            } catch (err) {
                logResult('GET', `/api/messages/${state.msg}`, 'ERROR', err.message);
            }
        }

        // DELETE Especializado que lee del State
        async function deleteLast(stateType, urlPrefix) {
            const currentId = state[stateType];
            if (!currentId) {
                resultBox.textContent = `[!] Necesitas primero un GET o POST de esta categoría para seleccionar un ID a borrar.\n\n` + resultBox.textContent;
                return;
            }
            try {
                const res = await fetch(`${urlPrefix}${currentId}`, { method: 'DELETE' });
                const successMsg = res.ok ? "DELETED COMPLETELY" : "FAILED deletion";
                logResult('DELETE', `${urlPrefix}${currentId}`, res.status, { success: successMsg, id: currentId });
                state[stateType] = null;
            } catch (err) {
                logResult('DELETE', `${urlPrefix}${currentId}`, 'ERROR', err.message);
            }
        }

        function clearResponse() {
            resultBox.textContent = "Awaiting Execution...";
        }
    </script>
</body>
</html>
